      BACKEND_URL: "http://backend:3001"

  miner-7:
    <<: *miner-common
    container_name: miner-7
    environment:
      MINER_ID: miner-7
      BITCOIN_RPC_HOST: node1
      BITCOIN_RPC_USER: bitcoin
